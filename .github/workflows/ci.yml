name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check .

  test:
    name: Tests (${{ matrix.area }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Verified to run fully offline (no AWS/OpenAI network calls).
          - area: incident-assistant-rag
            dir: projects/incident-assistant-rag/backend
          - area: incident-rag-bedrock
            dir: projects/incident-rag-bedrock
          - area: langchain-langgraph-lecture
            dir: lectures/10_langchain_langgraph
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        working-directory: ${{ matrix.dir }}
        run: python -m pytest -q
