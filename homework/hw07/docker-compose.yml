services:
  ollama:
    image: ollama/ollama:latest
    container_name: hw07-ollama
    volumes:
      - ollama-hw07:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  open-webui:
    # Pin latest stable — https://github.com/open-webui/open-webui/releases
    image: ghcr.io/open-webui/open-webui:v0.10.1
    container_name: hw07-open-webui
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "false"
      ENABLE_OLLAMA_API: "true"
    volumes:
      - open-webui-hw07:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

volumes:
  ollama-hw07:
  open-webui-hw07:
