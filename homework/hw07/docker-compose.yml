# hw07 — Open WebUI + Ollama stack with RAG settings as env vars.
# Verify RAG_* / ENABLE_* names against current Open WebUI docs — unknown vars are ignored.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: hw07-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-hw07:/root/.ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hw07-open-webui
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: hw07-local-dev-secret-change-in-prod
      RAG_EMBEDDING_ENGINE: ollama
      RAG_EMBEDDING_MODEL: nomic-embed-text
      RAG_TEXT_SPLITTER: token
      CHUNK_SIZE: "700"
      CHUNK_OVERLAP: "100"
      ENABLE_RAG_HYBRID_SEARCH: "true"
      RAG_RERANKING_MODEL: BAAI/bge-reranker-v2-m3
      RAG_TOP_K: "5"
      RAG_RELEVANCE_THRESHOLD: "0.15"
      RAG_SYSTEM_CONTEXT: "true"
      ENABLE_KB_EXEC: "true"
    volumes:
      - open-webui-hw07:/app/backend/data
    restart: unless-stopped

volumes:
  ollama-hw07:
  open-webui-hw07:
