services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.6.15
    container_name: hw07-open-webui
    ports:
      - "3001:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBUI_AUTH: "false"
      ENABLE_SIGNUP: "true"
    volumes:
      - open-webui-hw07:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-hw07:
