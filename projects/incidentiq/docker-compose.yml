services:
  incidentiq:
    build:
      context: .
      dockerfile: Dockerfile
    image: incidentiq:latest
    container_name: incidentiq-app

    ports:
      - "127.0.0.1:8000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data:ro
      - ./vectorstore:/app/vectorstore

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s