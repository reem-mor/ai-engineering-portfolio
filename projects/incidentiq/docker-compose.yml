# IncidentIQ — recommended local/production-like deployment.
# Secrets: copy .env.example → .env (never commit .env). Compose loads it at runtime only.
#
#   docker compose up -d --build   # build image + start
#   docker compose logs -f         # tail logs
#   docker compose down            # stop and remove container
#   docker compose ps              # status + health

services:
  incidentiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: incidentiq:latest
    container_name: incidentiq-app
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: true
    environment:
      # Container always listens on 8000; host port comes from APP_PORT in .env
      APP_PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
