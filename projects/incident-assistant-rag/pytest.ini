[pytest]
testpaths = backend/tests
pythonpath = backend
# Third-party deprecations (safe to ignore until faiss-cpu / supabase catch up to numpy & auth stack)
filterwarnings =
    ignore::DeprecationWarning:faiss.loader
    ignore::DeprecationWarning:supabase
    ignore::DeprecationWarning:gotrue.*
    ignore:builtin type SwigPyPacked:DeprecationWarning
    ignore:builtin type SwigPyObject:DeprecationWarning
    ignore:builtin type swigvarlink:DeprecationWarning
