services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: incidentiq-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: incidentiq-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
