# Local development convenience only.
# On EC2 we run the container directly via `docker run` from user-data.
services:
  web:
    build: .
    image: incident-rag-bedrock:dev
    container_name: incident-rag
    ports:
      - "8080:8080"
    env_file: .env
    # Locally we forward host AWS creds so boto3 can call Bedrock.
    # (On EC2 we use an instance profile instead.)
    volumes:
      - ~/.aws:/home/app/.aws:ro
    restart: unless-stopped
