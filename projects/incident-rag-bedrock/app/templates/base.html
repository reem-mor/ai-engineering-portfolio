<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}IncidentIQ · Bedrock RAG{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>
  <header class="topbar" role="banner">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">🛰️</span>
      <div class="brand-text">
        <span class="brand-name">IncidentIQ</span>
        <span class="brand-tag">Bedrock RAG · Incident Operations</span>
      </div>
    </div>
    <div class="status-pill" title="Backed by Amazon Bedrock Knowledge Base">
      <span class="dot"></span> grounded · Bedrock KB
    </div>
  </header>

  <main class="container" role="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer" role="contentinfo">
    <span>Topic: <strong>Incident Operations</strong></span>
    <span aria-hidden="true">·</span>
    <span>Powered by Amazon Bedrock + Flask + boto3</span>
  </footer>
</body>
</html>
