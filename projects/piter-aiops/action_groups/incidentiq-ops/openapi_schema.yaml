openapi: 3.0.0
info:
  title: PITER AiOps Operations
  version: 1.0.0
  description: Operational tools for the PITER AiOps NOC/SRE assistant.

paths:
  /environments/{environment}/status:
    get:
      summary: Get current operational status of an environment.
      description: |
        Returns health, active alert count, and last health-check time
        for the given environment (NJ, DGE, GIB, GBGA, UKGC, MGM, MIRAGE).
      operationId: getEnvironmentStatus
      parameters:
        - name: environment
          in: path
          required: true
          description: Environment code such as NJ, GIB, or MGM.
          schema:
            type: string
      responses:
        "200":
          description: Status retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: HEALTHY, DEGRADED, or UNKNOWN.
                  active_alerts:
                    type: integer
                    description: Count of active alerts in the environment.
                  last_check:
                    type: string
                    description: ISO-8601 timestamp of the last health check.

  /environments/{environment}/alerts:
    get:
      summary: List recent alerts for an environment.
      description: Returns alerts fired in the last N hours for the given environment.
      operationId: getRecentAlerts
      parameters:
        - name: environment
          in: path
          required: true
          description: Environment code such as NJ, GIB, or MGM.
          schema:
            type: string
        - name: hours
          in: query
          required: false
          description: Lookback window in hours (default 24, max 168).
          schema:
            type: integer
      responses:
        "200":
          description: Alert list returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  environment:
                    type: string
                    description: Environment code queried.
                  window_hours:
                    type: integer
                    description: Hours of lookback used for the query.
                  count:
                    type: integer
                    description: Number of alerts in the window.
                  alerts:
                    type: array
                    description: Recent alerts for the environment.
                    items:
                      type: object
                      properties:
                        alert_id:
                          type: string
                          description: Unique alert identifier.
                        severity:
                          type: string
                          description: Alert severity P1 through P4.
                        title:
                          type: string
                          description: Short alert title.
                        fired_at:
                          type: string
                          description: ISO-8601 time the alert fired.
                        host:
                          type: string
                          description: Host or service that triggered the alert.

  /incidents:
    post:
      summary: Create an incident ticket.
      description: |
        WRITE ACTION — opens a new incident ticket. Confirm intent with the user
        before invoking. Returns a ticket_id on success.
      operationId: createIncident
      x-requireConfirmation: ENABLED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - severity
                - environment
              properties:
                title:
                  type: string
                  description: Short summary of the incident.
                severity:
                  type: string
                  description: Severity level P1, P2, P3, or P4 where P1 is highest.
                environment:
                  type: string
                  description: Environment code such as NJ, GIB, or MGM.
                description:
                  type: string
                  description: Optional longer description of the incident.
      responses:
        "200":
          description: Incident created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket_id:
                    type: string
                    description: New incident ticket identifier.
                  status:
                    type: string
                    description: Ticket status such as OPEN.
                  created_at:
                    type: string
                    description: ISO-8601 creation timestamp.
