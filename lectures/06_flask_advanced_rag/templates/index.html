<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="app">
        <!-- ============== SIDEBAR ============== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__header">
                <div class="brand">
                    <div class="brand__mark">R</div>
                    <div class="brand__text">
                        <div class="brand__title">RAG Assistant</div>
                        <div class="brand__subtitle">Gemini + FAISS</div>
                    </div>
                </div>
                <button class="icon-btn" id="newChatBtn" title="New conversation">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>

            <button class="new-chat" id="newChatBtnLarge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New conversation
            </button>

            <div class="sidebar__label">Recent</div>
            <div class="session-list" id="sessionList">
                <!-- session items injected via JS -->
            </div>

            <div class="sidebar__footer">
                <div class="status" id="engineStatus">
                    <span class="status__dot" data-state="loading"></span>
                    <span class="status__text">Starting engine...</span>
                </div>
            </div>
        </aside>

        <!-- ============== MAIN ============== -->
        <main class="main">
            <header class="main__header">
                <button class="icon-btn icon-btn--ghost" id="toggleSidebar" title="Toggle sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="main__title">
                    <h1 id="conversationTitle">New conversation</h1>
                    <span class="main__subtitle" id="conversationMeta"></span>
                </div>
                <div class="main__actions">
                    <button class="icon-btn icon-btn--ghost" id="renameBtn" title="Rename" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </button>
                    <button class="icon-btn icon-btn--ghost" id="deleteBtn" title="Delete" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"></path>
                            <path d="M10 11v6"></path>
                            <path d="M14 11v6"></path>
                            <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <section class="messages" id="messages">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state__icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <h2>Ask anything about your documents</h2>
                    <p>
                        Your knowledge base is indexed with FAISS and powered by Gemini.
                        Start a conversation below.
                    </p>
                    <div class="suggestions" id="suggestions">
                        <button class="suggestion" data-q="What is this document about?">
                            What is this document about?
                        </button>
                        <button class="suggestion" data-q="Summarize the key risks.">
                            Summarize the key risks
                        </button>
                        <button class="suggestion" data-q="What recommendations are made?">
                            What recommendations are made?
                        </button>
                    </div>
                </div>
            </section>

            <footer class="composer">
                <form class="composer__form" id="chatForm" autocomplete="off">
                    <textarea
                        id="chatInput"
                        class="composer__input"
                        placeholder="Ask a question about your documents..."
                        rows="1"
                        disabled
                    ></textarea>
                    <button type="submit" class="composer__send" id="sendBtn" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                <div class="composer__hint">
                    Press <kbd>Enter</kbd> to send &middot; <kbd>Shift</kbd>+<kbd>Enter</kbd> for a new line
                </div>
            </footer>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
