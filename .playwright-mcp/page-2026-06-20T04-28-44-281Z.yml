                          - heading "What it does" [level=3] [ref=e557]
                          - paragraph [ref=e558]: A production-shaped customer-support assistant. It answers general support questions, escalates billing issues by Email AND Slack, and refuses anything outside its scope.
                          - heading "Defense-in-depth (2 layers)" [level=3] [ref=e559]
                          - paragraph [ref=e560]:
                            - strong [ref=e561]: "Layer 1 - Input Guardrails (deterministic, pre-agent):"
                            - text: a cheap classifier gate that blocks jailbreaks, off-topic / investment requests, and prompt-injection BEFORE any expensive reasoning runs.
                            - strong [ref=e562]: "Layer 2 - Agent system prompt:"
                            - text: the agent itself enforces the same rules, so a bypass of one layer is still caught by the other.
