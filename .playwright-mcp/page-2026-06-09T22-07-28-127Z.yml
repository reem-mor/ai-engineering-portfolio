            - generic [ref=e156]: You
            - generic [ref=e157]: What should I check when users cannot log in after the latest deployment?
          - generic [ref=e158]:
            - generic [ref=e159]: PITER
            - generic [ref=e160]: "**Priority:** Classify as P1-P2 if login failures affect all users or regulated markets; P3 if isolated to a subset. ## Investigation Steps (in order) When users cannot log in after a deployment, check the following systematically: 1. **Deployment timing correlation**: Confirm whether login failures started within 60 minutes of the latest deployment and validate the production error rate across affected markets. 2. **Recent changes**: Review recent auth-service deployments, feature flag rollouts, schema migrations, and any token-signing key changes. 3. **Auth-service health**: Validate pod health, readiness probes, and `/health/ready` endpoint responses to ensure the service itself is operational. 4. **Redis token store**: Check Redis latency, evictions, memory pressure, and primary/replica status—connection pool exhaustion between auth-service and Redis is a common root cause. 5. **Customer database**: Inspect customer-db for connection pool exhaustion, lock waits, migration locks, and slow queries that could block authentication lookups. 6. **API Gateway routes**: Verify OIDC discovery paths and public API Gateway routes are returning valid responses—invalid route rules for OIDC callback paths have caused past incidents. ## Triage Decision Tree - **If deployment occurred within the last hour and failures started immediately after**: Prepare rollback first while continuing dependency checks. Confirm rollback availability and database migration compatibility. - **If users receive 401 errors and Redis shows evictions or high latency**: Follow the Redis token store runbook—this was the root cause in incident INC-AUTH-2026-03-08. - **If auth-service pods are healthy but API Gateway returns 5xx**: Follow the API Gateway 5xx runbook—check for route configuration drift. - **If customer-db shows lock waits or exhausted connections**: Follow the database connectivity runbook and involve DBA. ## Remediation Steps (ordered, reversible first) 1. **Freeze releases**: Stop additional auth-service deployments until the incident commander approves. 2. **Rollback or feature flag disable**: If deployment correlation is strong and rollback is available, execute the approved rollback. If only a new code path is affected, prefer disabling the feature flag for token validation, MFA routing, or session write behavior. 3. **Capture logs first**: Before restarting any pods, capture logs from unhealthy auth-service instances. 4. **Restart unhealthy pods only**: Restart only the pods showing health probe failures, not the entire fleet. 5. **Validate recovery**: Check that `auth_login_success_rate` returns to baseline, `auth_login_error_rate` stays below 1% for 10 minutes, Redis token operations are stable, and synthetic login tests pass. ## Escalation For P1/P2 login incidents, escalate to **Identity and Access primary on-call**, then secondary on-call if no acknowledgement within the policy window. Include service name, deployment correlation, business impact, and rollback status in the escalation. ## Historical Context - **INC-AUTH-2026-03-08**: Login timeouts after a connection pool change—root cause was pool exhaustion between auth-service and Redis. Resolved by rollback and reducing token refresh concurrency. - **INC-AUTH-2025-10-28**: Login failures in EU after gateway configuration drift—invalid OIDC callback route rules were the root cause. - **INC-DEPLOY-2026-05-12**: Auth-service P2 after feature flag rollout—token validation logic rejected valid sessions; resolved by disabling the flag then rolling back code. ## Key Dependencies to Monitor Login failures after deployment typically involve: - **Auth-service** (primary) - **Redis token store** (session/token storage) - **Customer-db** (user authentication lookups) - **API Gateway** (OIDC and routing) Similarity signals from past incidents: same service (auth-service), same timing (failure starts after deployment), same symptoms (login error rate, token validation failure, 401 for valid users)."
          - generic [ref=e161]:
            - generic [ref=e162]: You
            - generic [ref=e163]: "Review alert ALT-2026-06-10-0001: Health check warning: redis-token-store response time 565ms"
          - generic [ref=e164]:
            - generic [ref=e165]: PITER
            - generic [ref=e166]: "**Priority: P3 (Warning)** 565ms response time is elevated but not yet causing user-facing failures. Classification rationale: - Warning threshold exceeded (typically 200-300ms baseline for Redis) - No deployment correlation in last 6 hours - Similar historical incidents (INC-2025-0034, INC-2025-0010, INC-2025-0017) were P3/P4 - Service is tier-0 with high regulatory exposure (UKGC, DGE) **Investigation findings:** • **No deployment correlation**: No redis-token-store or auth-service deploys in last 6 hours • **Historical patterns**: 3 similar incidents found - latency spikes typically caused by insufficient retry backoff, provider throttling, or dependency latency (MTTR 65-69 minutes) • **Business impact**: ~50,000 active users affected, $66,000/hour revenue risk if degradation continues. SLA risk moderate (99.95% target). High regulatory exposure (UKGC, DGE) and reputation risk. • **Owner**: Identity & Access team, escalation path: Primary → Secondary Identity & Access On-Call (PD-REDI-001) **Required next steps:** 1. Check Redis `PING` latency, memory usage (>90% triggers evictions), and eviction count 2. Verify primary/replica health and failover status 3. Compare Redis latency metrics with auth-service token validation error rate 4. Check network connectivity between auth-service pods and Redis 5. Inspect client connection pool saturation on auth-service **Triage plan** (reversible steps first, cite runbook redis_token_store_degradation.json): 1. **Immediate checks** (no changes): - Verify Redis memory <90% and eviction count stable - Confirm primary role and replica connectivity - Check auth-service client pool size vs. current load 2. **If memory pressure (>90%)**: - Disable noisy token refresh paths or reduce refresh frequency if safe - Prepare to scale Redis memory (requires pre-approval) 3. **If connection pool exhaustion**: - Verify auth-service connection reuse patterns - Restart only unhealthy auth-service pods after log capture (not Redis itself) 4. **If primary unavailable**: - Follow managed Redis failover process (escalate to Data Platform) **DO NOT** execute `FLUSHDB` without incident commander and Identity owner approval. **Escalation recommendation:** • **When**: Escalate immediately if latency exceeds 1000ms, evictions begin, or login errors rise above 1% • **Who**: Primary Identity & Access On-Call (PagerDuty PD-REDI-001), then Secondary if no ack in 15 minutes • **Additional**: Involve Data Platform team if Redis failover or capacity scaling required • **Regulatory note**: High regulatory exposure (UKGC, DGE) - prepare incident timeline and evidence logs **Resolution plan:** Validation checks before declaring resolved: - Redis latency returns to baseline (<200ms) - Eviction count stops increasing - `auth_login_success_rate` returns to baseline - `auth_login_error_rate` stays below 1% for 10 minutes - Synthetic login tests pass in production Safe recovery path: Monitor for 15 minutes post-mitigation. If latency spikes again, prepare to scale Redis capacity or reduce token write pressure. Post-incident follow-up: Review token refresh volume changes, update saturation alerts (lesson from INC-2025-0010), validate runbook steps. **Sources:** - Runbook: redis_token_store_degradation.json (mhES) - Runbook: auth_service_login_failure (WHUr, eg0M) - Historical incidents: INC-2025-0034, INC-2025-0010, INC-2025-0017 - Service owner: Identity & Access team (PROD) - Business impact: $66,000/hr, 50k users, regulatory exposure UKGC/DGE **Confidence: Medium** • High confidence on runbook steps and escalation path • Medium confidence on root cause without current Redis metrics (memory, evictions, primary status) • Uncertainty: Need real-time Redis health data to confirm triage path (memory pressure vs. connection pool vs. failover) **Recommended immediate action:** Gather Redis metrics (memory %, eviction count, PING latency, primary status) before executing remediation steps."
