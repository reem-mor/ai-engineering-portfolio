        - generic [ref=e2916]: "**Escalation for INV-2026-0610-001 (P1 bet-service in GIB-UKGC):** **Primary escalation path:** 1. **Primary Betting Core On-Call** (PagerDuty service: PD-BET--001) 2. **Secondary Betting Core On-Call** (backup) **Immediate notification required:** Per P1 escalation policy, notify: - Primary on-call engineer (Betting Core team) - Secondary on-call engineer (Betting Core team) - Incident commander - Service lead (Betting Core) **Critical context:** - This is a **regulated market** (UKGC - UK Gambling Commission) with potential compliance exposure - **100% error rate** on bet-service creates broad customer-facing outage and direct revenue impact - **Tier-0 service** per business impact matrix requiring immediate escalation **Recommended next action:** Once primary on-call is engaged, initiate triage for recent deployments (check if rollback is needed per the Deployment Rollback Runbook). A similar P1 incident (INC-DEPLOY-2026-06-10) in the same service/environment was resolved via rollback after a retry-policy deployment caused connection pool saturation. Do NOT delay escalation to confirm root cause—notify on-call immediately while investigation continues in parallel. **Sources:** - Service owner lookup: <REDACTED> (bet-service, GIB-UKGC) - PITER Escalation Policy (source: Un38) - Business Impact Matrix (source: 0llc) - Historical Deployment Incidents (source: 3zNH)"
