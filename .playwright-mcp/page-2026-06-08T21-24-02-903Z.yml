            - generic [ref=e3210]:
              - generic [ref=e3211]: historical_deployment_incidents.md
              - paragraph [ref=e3212]: "--- title: \"Historical Deployment Incidents\" doc_type: \"incident\" services: \"auth-service, bet-service, api-gateway\" environments: \"production, GIB-UKGC, NJ-DGE\" severity_applicable: \"P1,P2\" tags: \"historical, deployment, rollback\" last_updated: \"2026-06-08\" author: \"PITER AiOps\" version: \"1.0\" --- # Historical Deployment Incidents ## INC-DEPLOY-2026-06-10 Bet-service P1 in GIB-UKGC followed a retry-policy deployment. Root cause was retry fan-out causing connection pool saturation. Resolution was rollback, restart of saturated pods, and circuit breaker validation. ## INC-DEPLOY-2026-05-12 Auth-service P2 began minutes after a feature flag rollout. Root cause was token validation logic rejecting a subset of valid sessions. Resolution was feature flag disablement and then code rollback. ## Reuse Guidance If the latest deployment is within one hour of the alert and rollback is available, prepare rollback while continuing dependency checks."
            - generic [ref=e3213]:
              - generic [ref=e3214]: escalation_policy.md
              - paragraph [ref=e3215]: "--- title: \"PITER Escalation Policy\" doc_type: \"policy\" services: \"all\" environments: \"production\" severity_applicable: \"P1,P2,P3,P4\" tags: \"escalation, safe preview, notification, guardrails\" last_updated: \"2026-06-08\" author: \"PITER AiOps\" version: \"1.0\" --- # PITER Escalation Policy PITER may recommend escalation and draft safe escalation previews. It must not send real escalation messages automatically. ## Severity Policy - P1: notify primary on-call, secondary on-call, incident commander, and service lead immediately. - P2: notify primary on-call and service lead within 15 minutes. - P3: notify primary on-call during business hours unless customer impact increases. - P4: ticket only unless trend worsens. ## Safe Escalation Preview Guidelines 1. Include service, environment, priority, impact, suspected cause, and next action. 2. Mask direct recipient details. 3. Do not include real phone numbers or personal email addresses. 4. Do not expose secrets, tokens, AWS keys, or private credentials. 5. Say when information is missing instead of inventing facts. ## Confirmation Human confirmation is required before SNS, SES, Slack, PagerDuty, or other live notifications."
            - generic [ref=e3216]:
              - generic [ref=e3217]: deployment_rollback.md
              - paragraph [ref=e3218]: "--- title: \"Deployment Rollback Runbook\" doc_type: \"runbook\" services: \"auth-service, api-gateway, bet-service, payment-service\" environments: \"production, GIB-UKGC, NJ-DGE\" severity_applicable: \"P1,P2\" tags: \"deployment, rollback, release, mitigation\" last_updated: \"2026-06-08\" author: \"PITER AiOps\" version: \"1.0\" --- # Deployment Rollback Runbook Use this runbook when an incident begins soon after a release and the service has a known rollback path. ## Investigation Steps 1. Identify the latest production deployment for the affected service and dependencies. 2. Compare deployment time with alert start time and customer-impact timeline. 3. Confirm rollback availability, prior version, and database migration compatibility. 4. Check whether a feature flag or configuration revert is safer than code rollback. 5. Announce rollback intent in the incident channel with service, version, and expected impact. ## Triage Decision Tree - Roll back when a release occurred within 60 minutes, metrics degraded after release, and rollback is available. - Prefer feature flag rollback when only a new code path is affected. - Do not roll back database migrations blindly; involve the owning team and DBA if schema changes are present. ## Remediation 1. Freeze further deployments for the affected service. 2. Execute the approved rollback command or CI/CD rollback job. 3. Watch rollout status until all pods are healthy. 4. Validate customer-facing success metrics for at least 10 minutes. 5. Open a follow-up ticket for the failed release before unfreezing deployments. ## Verification - Error rate, latency, and saturation return to baseline. - No new alerts fire for the same service. - The previous version is confirmed in deployment inventory. ## Escalation For P1 rollback, notify service owner, incident commander, and platform release owner. For P2 rollback, notify service owner and release owner."
            - generic [ref=e3219]:
              - generic [ref=e3220]: business_impact_matrix.md
              - paragraph [ref=e3221]: "--- title: \"Business Impact Matrix\" doc_type: \"policy\" services: \"auth-service, payment-service, api-gateway, redis-token-store, customer-db\" environments: \"production, GIB-UKGC, NJ-DGE\" severity_applicable: \"P1,P2,P3,P4\" tags: \"business impact, priority, sla, revenue\" last_updated: \"2026-06-08\" author: \"PITER AiOps\" version: \"1.0\" --- # Business Impact Matrix Use this matrix to explain customer, revenue, SLA, and regulatory impact in incident responses. ## Tier-0 Services - Auth-service: blocks login and all authenticated journeys. P1 if most users cannot log in. - Payment-service: direct transaction revenue impact and compliance follow-up. - API Gateway: can block all customer traffic even when backends are healthy. - Customer database and Redis token store: dependency failures can cascade into auth, wallet, and payments. ## Priority Heuristics - P1: broad customer-facing outage, high revenue risk, or regulated-market exposure. - P2: major degradation, partial outage, or high-impact single market. - P3: recoverable degradation with limited customer impact. - P4: operational noise with no customer impact. ## Explanation Template State the affected service, users or market, estimated revenue exposure, SLA risk, regulatory risk, and the next mitigation step."
