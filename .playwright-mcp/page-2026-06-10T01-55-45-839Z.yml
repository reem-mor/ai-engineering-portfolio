                - heading "Investigation" [level=3] [ref=e1324]
                - generic [ref=e1325]:
                  - list [ref=e1326]:
                    - listitem [ref=e1327]: "Priority: P1 – CRITICAL 100% error rate on bet-service in GIB-UKGC is a P1 production outage. Business impact: ~32,000 active users affected, $9,800/minute revenue loss ($588,000/hour), critical SLA breach, and HIGH regulatory exposure (UKGC, DGE, MGM). Investigation findings: 1. Similar incident match (INC-2025-11-04-GIB-BET-OUTAGE): bet-service 100% error rate in GIB-UKGC caused by connection pool exhaustion from retry storm against wallet dependency. MTTR was 27 minutes. Resolution: disabled retry fan-out, restarted bet-service pool, validated wallet latency. 2. No recent deployments: No bet-service or dependency deployments detected in the last 6 hours, so deployment rollback is NOT the primary path. 3. Dependencies: bet-service depends on wallet-service, auth-service, game-service, and replication. Connection pool saturation or dependency latency are likely culprits. 4. Owner: Betting Core team, PagerDuty service PD-BET--001. Triage plan (ordered, reversible steps): 1. Freeze deployments for bet-service and dependencies immediately. 2. Check bet-service pod health – confirm readiness probes, /health endpoints, and whether all nodes are failing or subset. Capture logs before restart. 3. Inspect connection pool metrics for bet-service to wallet-service, auth-service, and database: - Active connections, pool exhaustion alerts - Retry metrics, circuit breaker state - Wallet-service and auth-service latency/error rate 4. If connection pool is saturated (matching INC-2025-11-04): - Disable retry fan-out or aggressive retry logic via feature flag or config - Restart bet-service pods in controlled waves after log capture - Validate wallet-service health and latency before full restart 5. If wallet-service or another dependency is degraded, follow that service's runbook immediately (dependency failures cascade to bet-service). 6. Monitor bet placement success rate and latency for 10 minutes after each change. Escalation recommendation: - Immediate: Notify Primary Betting Core On-Call via PagerDuty (PD-BET--001), escalate to Secondary On-Call, Team Lead, and Incident Commander per P1 policy. - Required roles: primary_on_call_role, secondary_on_call_role, team_lead, incident_commander. - Channels: SNS + SES. - This is preview mode – real escalation requires explicit confirmation and live_notify operation. Escalate to Platform DBA if database connection pool exhaustion is confirmed. Escalate to Wallet team if wallet-service is the blocking dependency. Resolution plan: 1. Validation checks: bet-service error rate < 1%, p99 latency returns to baseline, no new alerts on bet-service or dependencies. 2. Safe recovery: Disable aggressive retry logic BEFORE restarting pods to avoid re-triggering connection pool saturation. 3. Post-incident: Open follow-up ticket to add circuit breaker gating for retries, alert on pool saturation before node exhaustion (lesson from INC-2025-11-04). 4. Unfreeze deployments only after Betting Core team reviews failure and validates fix. Business impact: - $9,800/minute ($588,000/hour) - 32,000 active users blocked - UKGC regulatory exposure (high risk) - Critical SLA breach (99.95% target) - Reputation risk: high Sources: - Similar incident: INC-2025-11-04-GIB-BET-OUTAGE (connection pool exhaustion, retry storm) - Runbook: deployment_rollback.json (incident patterns and validation steps) - Runbook: database_connectivity.json (connection pool triage) - Service owner: Betting Core, PagerDuty PD-BET--001 - Business impact: Tier-0 service, $588K/hr revenue impact Confidence and uncertainty: - High confidence this is connection pool exhaustion or dependency cascade based on INC-2025-11-04 exact match (same service, environment, symptom). - Medium confidence on root cause until pool metrics and dependency health are confirmed. - Missing data: Current pod health status, connection pool utilization, wallet-service/auth-service real-time metrics. Recommend immediate inspection before restart. - Next steps: Capture logs, check pool metrics, validate wallet/auth health, then proceed with controlled remediation per historical playbook."
