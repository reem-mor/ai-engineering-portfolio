          - generic [ref=e155]:
            - generic [ref=e156]: You
            - generic [ref=e157]: What should I check when users cannot log in after the latest deployment?
          - generic [ref=e158]:
            - generic [ref=e159]: PITER
            - generic [ref=e160]: "**Priority:** Likely P1 or P2 depending on scope (login failures are typically high severity on regulated betting platforms). **Investigation Steps (ordered priority):** 1. **Confirm deployment correlation** – Check if login failures started within 60 minutes of the deployment. Compare deployment time with alert start time and customer-impact timeline. 2. **Check recent auth-service changes** – Review deployments, feature flags, schema migrations, and token-signing key changes. 3. **Validate auth-service health** – Check pod health, readiness probes, and `/health/ready` endpoint responses. 4. **Check Redis token store** – Verify latency, evictions, memory pressure, and primary/replica status (login issues often correlate with Redis problems). 5. **Check customer-db connectivity** – Look for connection pool exhaustion, lock waits, and migration locks. 6. **Confirm API Gateway routes** – Verify OIDC discovery and public API Gateway routes are returning valid responses (not 5xx). **Triage Decision Tree:** - **If deployment was within the last hour and failures started immediately** → Prepare rollback first - **If login returns 401 for valid users and Redis shows evictions/high latency** → Follow Redis token store runbook - **If auth-service pods are healthy but API Gateway returns 5xx** → Follow API Gateway 5xx runbook - **If customer-db has lock waits or exhausted connections** → Follow database connectivity runbook **Remediation (ordered, reversible steps first):** 1. **Freeze additional releases** – Stop all auth-service deployments until incident commander approves. 2. **Roll back the deployment** if deployment correlation is strong and rollback is available. 3. **Disable new feature flags** – Especially for token validation, MFA routing, or session write behavior. 4. **Restart unhealthy pods only** – After capturing logs first. 5. **Validate recovery** – Monitor `auth_login_success_rate` returning to baseline and `auth_login_error_rate` staying below 1% for 10 minutes. **Escalation:** P1/P2 login incidents escalate to **Identity and Access primary on-call**, then secondary on-call per policy. For P1 rollback, notify service owner, incident commander, and platform release owner. **To run deployment correlation and find similar incidents, I need:** - Service name (e.g., auth-service) - Environment (e.g., prod, GIB-UKGC) - Alert time (ISO-8601 format) Provide these details and I can correlate recent deployments, check for similar past incidents, and retrieve ownership/escalation contacts."
