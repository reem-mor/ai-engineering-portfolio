                - heading "Investigation" [level=3] [ref=e2055]
                - generic [ref=e2056]:
                  - list [ref=e2057]:
                    - listitem [ref=e2058]: "Priority: P1 CRITICAL 100% error rate on bet-service with unresponsive nodes in GIB-UKGC is a P1 incident. Business impact: ~32,000 active users affected, $9,800/minute ($588,000/hour revenue loss). Critical SLA risk and high regulatory exposure (UKGC, DGE, MGM). Investigation findings: 1. No recent deployments — No bet-service or dependency deployments detected in the last 6 hours, so deployment rollback is not the primary suspect. 2. Historical pattern match — This matches INC-2025-11-04-GIB-BET-OUTAGE, where bet-service reached 100% error rate due to connection pool exhaustion from a retry storm against wallet-service dependency. That incident was resolved in 27 minutes via disabling retry fan-out, restarting the bet-service pool, and validating wallet latency. 3. Dependencies — bet-service depends on wallet-service, auth-service, game-service, and database replication. Connection pool saturation in any of these can cascade to bet-service nodes becoming unresponsive. Triage plan (ordered, reversible steps): Immediate (0–5 min): 1. Check wallet-service health and latency — Prior incident root cause was wallet dependency saturation triggering retry storms. Confirm wallet-service error rate, p99 latency, and connection pool status. 2. Inspect bet-service connection pools — Check active connections to wallet-service, auth-service, and customer-db. Look for pool exhaustion or timeout spikes. 3. Review circuit breaker status — Confirm whether circuit breakers are in place and tripped. The prior lesson learned emphasized gating retries with circuit breakers. Mitigation (5–15 min if pool saturation confirmed): 4. Disable retry-heavy code paths or feature flags — If a retry config or feature flag is active, disable it immediately to stop the fan-out. 5. Restart saturated bet-service pods — Restart only the unresponsive bet-service pods after capturing logs and confirming dependencies are healthy. Do not restart all pods simultaneously. 6. Validate wallet-service recovery — If wallet is degraded, follow its service runbook before restarting bet-service nodes. Verification (15–25 min): 7. Bet-service error rate drops below 1% and stays there for 10 minutes. 8. Bet placement success metrics return to baseline. 9. No new alerts fire for wallet-service or auth-service. Escalation recommendation: ESCALATE IMMEDIATELY — P1 with $9,800/min revenue loss and UKGC regulatory exposure. - Owner team: Betting Core - Escalation path: Primary Betting Core On-Call → Secondary Betting Core On-Call - PagerDuty: PD-BET--001 - Notify roles: Primary on-call, secondary on-call, team lead, incident commander Per PITER policy, P1 incidents must be escalated within 5 minutes. Notify wallet-service owner if wallet dependency is confirmed as the trigger. Resolution plan: 1. Once retry storm or connection pool saturation is confirmed and mitigated, monitor bet-service for stable error rate and latency for 15 minutes. 2. Validate bet placement end-to-end from synthetic checks. 3. If rollback is needed later (e.g., if a config change or feature flag is implicated), freeze further releases and prepare rollback per the deployment rollback runbook. 4. Post-incident: Review circuit breaker configuration, add alerting on connection pool saturation before node exhaustion, and update retry policies. Confidence and uncertainty: Confidence: HIGH — Strong match to prior P1 incident (INC-2025-11-04) with identical symptom (100% error, unresponsive nodes) and environment. Connection pool exhaustion from retry storms is the most likely root cause. Uncertainty: Without current metrics visibility, I cannot confirm which dependency (wallet, auth, game-service) is triggering the retry storm. Immediate action required: Check wallet-service health, bet-service connection pool metrics, and circuit breaker status before restarting nodes."
